name: Deploy Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: react/hyfloac.github.io
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: react/hyfloac.github.io/package-lock.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install Dependencies
        run: npm ci

      - name: Build Site
        run: npm run build

      - name: Add Root Site Files
        run: |
          cp ../../CNAME out/CNAME
          cp ../../robots.txt out/robots.txt
          cp ../../humans.txt out/humans.txt
          cp ../../sitemap.xml out/sitemap.xml
          cp ../../income.html out/income.html
          cp ../../interest.html out/interest.html
          cp ../../nato.html out/nato.html
          cp ../../commonUtils.js out/commonUtils.js
          cp ../../taxes.js out/taxes.js

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: react/hyfloac.github.io/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
